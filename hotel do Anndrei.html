<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="css.css">
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Camas - Família</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        #calendar { margin-top: 20px; }
        .legend { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; font-size: 0.9em; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 Reserva de Camas - Apê</h1>
    
    <div class="legend">
        <div class="legend-item"><div class="box" style="background: #3788d8;"></div> Cama 1 Ocupada</div>
        <div class="legend-item"><div class="box" style="background: #e67e22;"></div> Cama 2 Ocupada</div>
    </div>

    <div id='calendar'></div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'pt-br',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,listMonth'
      },
      selectable: true,
      events: [
        // Exemplo de reservas já existentes
        { title: 'Tio João (Cama 1)', start: '2026-03-05', end: '2026-03-07', color: '#3788d8' },
        { title: 'Maria (Cama 2)', start: '2026-03-06', end: '2026-03-06', color: '#e67e22' }
      ],
      select: function(info) {
        var nome = prompt('Nome de quem vai ficar:');
        var cama = prompt('Qual cama? (1 ou 2) obs: as duas são de casal:');
        
        if (nome && (cama === '1' || cama === '2')) {
          calendar.addEvent({
            title: nome + ' (Cama ' + cama + ')',
            start: info.startStr,
            end: info.endStr,
            color: cama === '1' ? '#3788d8' : '#e67e22',
            allDay: true
          });
          alert('Reserva anotada! Lembre-se que isso é apenas visual. Avise no WhatsApp também!');
        }
      }
    });
    calendar.render();
  });
</script>

   <script src="hotel.js"></script>
</body>
</html>
